model:
  hidden_size: 256
  latent_size: 64
  num_layers: 2

training:
  batch_size: 32
  epochs: 200
  learning_rate: 0.0001
  kl_weight: 0.001
  gradient_clip: 5
  
  # Stage 2 fine-tuning
  freeze_lstm_epochs: 10
  joint_lr: 0.00001

data:
  max_seq_len: 500
  augment_factor: 5
  train_split: 0.9
